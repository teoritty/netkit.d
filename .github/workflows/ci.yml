name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: network-tools:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the container
        run: |
          docker run -d --name nt -p 8000:8000 \
            --sysctl net.ipv4.ping_group_range="0 2147483647" network-tools:ci
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:8000/ >/dev/null; then
              echo "Container is up"; exit 0
            fi
            sleep 2
          done
          echo "Container failed to start"; docker logs nt; exit 1
